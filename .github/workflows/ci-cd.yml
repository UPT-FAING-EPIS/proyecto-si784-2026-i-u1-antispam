########################################################
# Aegis Filter – GitHub Actions CI/CD Pipeline
# Trigger: push a main / PR a main
# Jobs: test → analyze → build-docker
########################################################

name: "Aegis Filter – CI/CD Pipeline"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  PHP_VERSION: "8.2"
  NODE_VERSION: "20"

jobs:
  # ════════════════════════════════════════════════════
  # JOB 1: Pruebas PHP + PHPUnit
  # ════════════════════════════════════════════════════
  test:
    name: "🧪 PHPUnit Tests"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: aegisfilter_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "🐘 Setup PHP ${{ env.PHP_VERSION }}"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, bcmath, mysql, zip, gd
          coverage: xdebug
          tools: composer:v2

      - name: "📦 Cache Composer"
        uses: actions/cache@v4
        with:
          path: src/vendor
          key: composer-${{ hashFiles('src/composer.lock') }}
          restore-keys: composer-

      - name: "⚙️ Instalar dependencias Composer"
        working-directory: ./src
        run: |
          composer install --no-interaction --no-progress --prefer-dist --no-scripts
          php artisan package:discover --ansi

      - name: "🔧 Preparar entorno de pruebas"
        working-directory: ./src
        run: |
          cp .env.testing .env
          php artisan key:generate
          php artisan config:clear

      - name: "🗄️ Ejecutar migraciones de prueba"
        working-directory: ./src
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: aegisfilter_test
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
        run: php artisan migrate --force

      - name: "🧪 Ejecutar PHPUnit con cobertura"
        working-directory: ./src
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: aegisfilter_test
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
        run: |
          ./vendor/bin/phpunit \
            --coverage-clover=coverage.xml \
            --log-junit=test-report.xml \
            --testdox

      - name: "📊 Subir reporte de cobertura"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage
          path: |
            src/coverage.xml
            src/test-report.xml

  # ════════════════════════════════════════════════════
  # JOB 2: Análisis de Calidad (SonarCloud + Snyk)
  # ════════════════════════════════════════════════════
  analyze:
    name: "🔍 Análisis de Calidad y Seguridad"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud requiere historial completo

      - name: "🐘 Setup PHP ${{ env.PHP_VERSION }}"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: xdebug

      - name: "📦 Instalar dependencias"
        working-directory: ./src
        run: composer install --no-interaction --no-progress

      - name: "📊 Descargar reporte de cobertura"
        uses: actions/download-artifact@v4
        with:
          name: phpunit-coverage
          path: src/

      # ── SonarCloud Analysis ─────────────────────────
      - name: "☁️ SonarCloud Scan"
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: src
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName="Aegis Filter"
            -Dsonar.projectVersion=1.0.0
            -Dsonar.sources=app,routes,database
            -Dsonar.tests=tests
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.php.tests.reportPath=test-report.xml
            -Dsonar.qualitygate.wait=true
        # No falla el pipeline si no hay token configurado (simulación)
        continue-on-error: true

      # ── Snyk Security Scan ──────────────────────────
      - name: "🛡️ Snyk – Análisis de vulnerabilidades"
        uses: snyk/actions/php@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=src/composer.lock
        continue-on-error: true

      - name: "🛡️ Snyk – Monitoreo continuo"
        run: |
          echo "================================================="
          echo "  Simulación Snyk Monitor"
          echo "  En producción: snyk monitor --org=your-org-id"
          echo "================================================="
          # snyk monitor --file=src/composer.lock
        continue-on-error: true

  # ════════════════════════════════════════════════════
  # JOB 3: Docker Build & Push
  # ════════════════════════════════════════════════════
  build-docker:
    name: "🐳 Docker Build & Push"
    runs-on: ubuntu-latest
    needs: [ test, analyze ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "🔑 Login a Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: "🏷️ Extraer metadata Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/aegisfilter
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: "⚡ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🐳 Build y Push imagen Docker"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=production

      - name: "✅ Resumen del pipeline"
        run: |
          echo "================================================="
          echo "  🎉 Pipeline completado exitosamente"
          echo "  📦 Imagen: ${{ steps.meta.outputs.tags }}"
          echo "  🏷️  Commit: ${{ github.sha }}"
          echo "================================================="
